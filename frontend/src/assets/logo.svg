  <ellipse cx="36" cy="62" rx="4.2" ry="4.8" fill="#ffffff"/>
  <circle cx="36.5" cy="63" r="2.2" fill="#111111"/>

  <!-- 右眼 -->
  <ellipse cx="92" cy="62" rx="4.2" ry="4.8" fill="#ffffff"/>
  <circle cx="91.5" cy="63" r="2.2" fill="#111111"/>

  <!-- 鼻子 -->
