name: Create GitHub Release

# 与 docker-release.yml 同样只在 push tag 时触发。
# 生成一个 GitHub Release，附带：
#   - docker-compose.release.yml（指向 Docker Hub 镜像，开箱即用）
#   - .env.example（需要用户填的密码/密钥）
# 让用户拿到 tag 就能 docker compose up。
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '已存在的 tag 名（例如 v1.2.3）'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve tag
        id: version
        run: |
          TAG="${{ github.event.inputs.tag }}"
          [ -z "$TAG" ] && TAG=${GITHUB_REF#refs/tags/}
          echo "TAG=${TAG}" >> $GITHUB_ENV
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Collect release assets
        run: |
          mkdir -p release
          cp docker-compose.release.yml release/ 2>/dev/null || true
          cp .env.example release/ 2>/dev/null || true
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ env.TAG }}
          name: AniDog ${{ env.TAG }}
          generate_release_notes: true
          body: |
            ## AniDog ${{ env.TAG }}

            ### Docker 镜像（多架构 amd64 / arm64）
            - `${{ secrets.DOCKERHUB_USERNAME }}/anidog-backend:${{ env.TAG }}`
            - `${{ secrets.DOCKERHUB_USERNAME }}/anidog-frontend:${{ env.TAG }}`

            ### 快速部署
            1. 下载本 Release 附带的 `docker-compose.release.yml` 与 `.env.example`
            2. `cp .env.example .env`，填好 `SECRET_KEY` / `POSTGRES_PASSWORD` / `DOWNLOADER_PASSWORD` 等
            3. 设置镜像归属与版本：`export DOCKERHUB_USERNAME=<你的用户名> TAG=${{ env.TAG }}`
            4. `docker compose -f docker-compose.release.yml up -d`
            5. 访问 `http://<host>:3002`

            > 镜像由 push tag 自动构建发布。`:latest` 始终指向最新 tag。
          files: |
            release/docker-compose.release.yml
            release/.env.example
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
