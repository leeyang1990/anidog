version: '3.8'

# 生产部署前请先创建 .env 文件覆盖默认密码：
#   SECRET_KEY=<32字节随机字符串>
#   POSTGRES_PASSWORD=<强密码>
#   DOWNLOADER_PASSWORD=<qBit 密码>
# docker compose 会自动读取 .env

services:
  postgres:
    image: postgres:16-alpine
    container_name: anidog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-anidog}
      POSTGRES_USER: ${POSTGRES_USER:-anidog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-anidog}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - anidog-network

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: anidog-qbittorrent
    restart: unless-stopped
    environment:
      PUID: 1000
      PGID: 1000
      TZ: ${TZ:-Asia/Shanghai}
      WEBUI_PORT: 8080
    volumes:
      - qbittorrent_config:/config
      - ./downloads:/downloads
    ports:
      - "8080:8080"      # Web UI
      - "6881:6881"      # BT 连接
      - "6881:6881/udp"  # DHT
    networks:
      - anidog-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: anidog-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qbittorrent:
        condition: service_started
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-anidog}:${POSTGRES_PASSWORD:-CHANGE_ME}@postgres:5432/${POSTGRES_DB:-anidog}?sslmode=disable

      DOWNLOADER_TYPE: qbittorrent
      DOWNLOADER_HOST: http://qbittorrent:8080
      DOWNLOADER_USERNAME: ${DOWNLOADER_USERNAME:-admin}
      DOWNLOADER_PASSWORD: ${DOWNLOADER_PASSWORD:-adminadmin}

      SECRET_KEY: ${SECRET_KEY:-CHANGE_ME_TO_RANDOM_32_BYTES}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      RSS_CHECK_INTERVAL: ${RSS_CHECK_INTERVAL:-30}

      CORS_HOSTS: ${CORS_HOSTS:-http://localhost:3002}

      ENABLE_NOTIFICATIONS: "${ENABLE_NOTIFICATIONS:-false}"
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      TMDB_LANGUAGE: ${TMDB_LANGUAGE:-zh-CN}
      TMDB_BASE_URL: ${TMDB_BASE_URL:-https://api.themoviedb.org/3}

    volumes:
      - ./downloads:/downloads
    ports:
      - "8088:8088"
    networks:
      - anidog-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8088/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
  qbittorrent_config:
    driver: local

networks:
  anidog-network:
    driver: bridge
