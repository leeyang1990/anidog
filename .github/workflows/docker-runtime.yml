name: Publish backend runtime image

# 运行时包含 Chromium/ffmpeg/字体，体积很大，只在依赖变更时手动发布。
on:
  workflow_dispatch:

jobs:
  build:
    name: Build runtime (${{ matrix.arch }})
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push runtime
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.runtime
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/anidog-backend-runtime:alpine3.24-v1-${{ matrix.arch }}
          # 与 backend 构建共用缓存，可直接复用既有的 914MB 依赖层。
          cache-from: type=gha,scope=backend-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=backend-${{ matrix.arch }}
          provenance: false
          sbom: false

  manifest:
    name: Create runtime multi-arch manifest
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create and push manifest
        run: |
          IMG=${{ secrets.DOCKERHUB_USERNAME }}/anidog-backend-runtime
          docker buildx imagetools create \
            -t ${IMG}:alpine3.24-v1 \
            ${IMG}:alpine3.24-v1-amd64 \
            ${IMG}:alpine3.24-v1-arm64
      - name: Inspect manifest
        run: docker buildx imagetools inspect ${{ secrets.DOCKERHUB_USERNAME }}/anidog-backend-runtime:alpine3.24-v1
